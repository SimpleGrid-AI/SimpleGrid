<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elite Arts &amp; Crafts Case Study - SimpleGrid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/LoginModal.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel">
function EliteCaseStudy() {
  const [showLogin, setShowLogin] = React.useState(false);
  return (<>
    <Nav page="cases" onLoginClick={() => setShowLogin(true)} />

    <section className="case-hero">
      <div className="container">
        <div className="tag">CASE STUDY</div>
        <h1>How a furniture exporter with 800 employees went from Excel to a live ERP in 21 days</h1>
        <p className="case-hook">Over four years, Elite Arts &amp; Crafts lost nearly $200,000 to material gaps they could not explain. Not theft. Not fraud. Just a furniture manufacturing operation running at 600–800 employees across 1 million sqft, tracked on Excel and WhatsApp.</p>
        <div className="case-strip">
          <div className="case-strip-item"><div className="label">Industry</div><div className="value">Furniture export</div></div>
          <div className="case-strip-item"><div className="label">Employees</div><div className="value">600–800</div></div>
          <div className="case-strip-item"><div className="label">Facilities</div><div className="value">~1,000,000 sqft</div></div>
          <div className="case-strip-item"><div className="label">Deployed in</div><div className="value">21 days</div></div>
        </div>
      </div>
    </section>

    <div className="container">
      {/* The Operation */}
      <section className="case-section">
        <h2>The operation</h2>
        <p>A furniture exporter running 600–800 people across nearly 1 million sqft of production space. Multi-stage manufacturing: raw wood comes in, finished furniture ships out to international buyers. Between those two points: machining, assembly, sanding, finishing, hardware installation, packing. Each stage handled by different contractors.</p>
        <p>550 SKUs. Each with an average of 20+ unique components. Each component requires a different wood species, different dimensions, different cubic footage to produce. A single dining table might need mango wood for the top, sheesham for the legs, and a third species for the frame.</p>
        <p>Work happens at two levels. Wood issuance and machining happen at the <strong>component level</strong>. Once all components for a SKU are machined and QC'd, they merge at assembly. From assembly onwards, tracking shifts to the <strong>SKU level</strong>.</p>
        <div className="img-placeholder" style={{margin:'24px 0',minHeight:240}}>Infographic: Two-level tracking - Component level → Assembly merge → SKU level flow</div>
      </section>

      {/* What Was Breaking */}
      <section className="case-section">
        <h2>What was breaking</h2>
        <p><strong>The company was profitable. Nobody knew which products were.</strong> The founder knew the business made money. But could he tell you whether the 6-seater dining table was more profitable than the bookshelf? No.</p>
        <div className="img-placeholder" style={{margin:'24px 0',minHeight:200}}>Infographic: SKU Profitability Stack - wood $42 + machining $18 + assembly $25 + hardware $8 + rejection $7 = $100 cost vs $135 buyer price = 26% margin</div>
        <ul className="pain-list">
          <li><strong>Planning was done on Excel.</strong> Planned vs. unplanned quantities lived in a spreadsheet that only the planner understood. When the planner was out, planning stopped.</li>
          <li><strong>Material tracking was manual.</strong> Wood arrived at the store. The storekeeper wrote it in a register. How much was issued to which job? Nobody knew in real time.</li>
          <li><strong>Production stages were untracked.</strong> If 600 pieces entered sanding and 580 came out, nobody caught the 20-piece gap until final count. Over 4 years, these gaps added up to nearly $200,000.</li>
          <li><strong>Contractor costing was reconciled monthly.</strong> Each contractor worked on multiple jobs, multiple stages. Settlement required cross-referencing handwritten logs with the planner's memory.</li>
          <li><strong>Floor staff could not use any ERP.</strong> The company had tried before. Too many menus. Too many dropdowns. Everyone went back to WhatsApp.</li>
          <li><strong>The founder had no dashboard.</strong> To answer "where are we on the West Elm order?" required 3 phone calls and 20 minutes.</li>
        </ul>
      </section>

      {/* What We Built */}
      <section className="case-section">
        <h2>What we built</h2>
        <p>We did multiple calls with the founder over 14 days. Mapped how work actually moves: every order type, every approval rule, every handoff between departments, every exception that only the founder knew about.</p>
        <p>After the first call, the founder saw a <strong>working demo within 24 hours</strong>. Not a slideshow. A working system reflecting how his factory actually runs. 21 days total from first conversation to live system.</p>
        <p style={{fontFamily:'var(--font-heading)',fontSize:18,fontWeight:700,color:'var(--sg-blue)',margin:'24px 0'}}>32 things tracked end-to-end. 36 automatic triggers.</p>
      </section>

      {/* The Full Production Flow */}
      <section className="case-section">
        <h2>The full production flow</h2>
        <div className="flow-steps">
          {[
            {s:'Buyer PO arrives.',b:'AI parses the PDF, any format. Creates a sales order with line items.'},
            {s:'Sales order approved.',b:'Founder or sales head approves. Cost snapshot freezes. Planning unlocks.'},
            {s:'Planner allocates.',b:'Per SKU: 400 in-house, 150 to Vendor A, 150 to Vendor B. System tracks planned vs. unplanned automatically.'},
            {s:'Downstream work creates itself.',b:'In-house allocation automatically creates a production job and calculates wood requirements broken down by component.'},
            {s:'Wood PO consolidated.',b:'All wood requirements across jobs aggregated by species into a single purchase order. Multiple vendors quoted.'},
            {s:'Wood received at store.',b:'System checks: seasoned or unseasoned? Inventory increases, accounts payable increases, rate auto-updates.'},
            {s:'Wood issued to components.',b:'Each component needs specific wood species cut to specific dimensions. Every cubic foot issued attaches to the SKU.'},
            {s:'Machining + QC per component.',b:'Each component tracked independently. Formal QC pass/fail at each gate. Gaps show up immediately.'},
            {s:'Assembly: components become a product.',b:'All machined components come together. From here, tracking shifts to SKU level through finishing stages.'},
            {s:'Vendor goods arrive.',b:'Semi-finished goods enter at configurable stage. Fully finished go direct to dispatch.'},
            {s:'Dispatch.',b:'One shipment can cover multiple sales orders. Partial dispatch allowed. Invoice triggered per buyer config.'},
            {s:'Invoice + settlement.',b:'Buyer invoiced per billing config. Contractors settled automatically: issued qty minus rejected qty times rate.'},
          ].map((step,i) => (
            <div key={i} className="flow-step">
              <p><strong>{step.s}</strong> {step.b}</p>
            </div>
          ))}
        </div>
        <p style={{fontSize:15,color:'var(--fg1)',fontWeight:600,marginTop:20}}>By the time a product ships, the system knows exactly what it cost to produce. SKU-level profitability. For the first time in the company's history.</p>
      </section>

      {/* Rules */}
      <section className="case-section">
        <h2>Rules the system enforces</h2>
        <p>These are not suggestions. The system physically rejects the action.</p>
        <ul className="rules-list">
          <li>Can't receive more material than the PO ordered. System rejects: "Maximum you can receive: 500."</li>
          <li>Can't dispatch more than planned quantity. Blocked.</li>
          <li>QC must approve before dispatch. System-enforced, not process-dependent.</li>
          <li>Contractor locked once assigned. Prevents cost manipulation.</li>
          <li>Can't issue wood to a completed job. Prevents inventory leakage.</li>
          <li>Wood inventory can't go negative.</li>
          <li>Component count must reconcile before assembly. The $200K problem: caught at the source.</li>
        </ul>
        <p style={{marginTop:16}}>Every one of these rules is a configuration, not code. When the business adds a new rule, we add it in minutes.</p>
      </section>

      {/* Floor Staff */}
      <section className="case-section">
        <h2>The floor staff problem, solved</h2>
        <p>Elite's floor supervisors, QC inspectors, and storekeepers had rejected a previous ERP. Too complex. Too far from how they actually work.</p>
        <p>With SimpleGrid, they talk to <strong>Hank</strong>, the AI chatbot. The storekeeper types: "Received 300 mango planks from Shree Timber." Hank identifies the PO, checks the quantity, updates inventory, and confirms. No menus. No dropdowns. No training manual.</p>
        <div className="img-placeholder" style={{margin:'24px 0',minHeight:180}}>Demo video: Hank chatbot interaction - floor staff entering data</div>
      </section>

      {/* Before/After */}
      <section className="case-section">
        <h2>What changed</h2>
        <table className="ba-table">
          <thead><tr><th>Before SimpleGrid</th><th>After SimpleGrid</th></tr></thead>
          <tbody>
            <tr><td>Profitable, but no idea which SKUs were</td><td>SKU-level profitability: wood, contractor, rejection costs attached to each product</td></tr>
            <tr><td>"Where's the order?" = 3 phone calls + 20 min</td><td>One dashboard. Real-time. Founder sees everything.</td></tr>
            <tr><td>Planning on Excel only one person understood</td><td>System tracks planned vs. unplanned per line item</td></tr>
            <tr><td>~$200K unaccounted material over 4 years</td><td>Component-level tracking catches every gap at the source</td></tr>
            <tr><td>Wood inventory reconciled monthly</td><td>Live inventory. Every receipt and issuance tracked</td></tr>
            <tr><td>Contractor settlements took days</td><td>Auto-calculated: issued qty minus rejected qty times rate</td></tr>
            <tr><td>Floor staff rejected previous ERP</td><td>Floor staff use Hank. Adopted on day one.</td></tr>
          </tbody>
        </table>
      </section>

      {/* Testimonial */}
      <div className="testimonial-block">
        <blockquote>"We have our own way of doing things: vendor consolidation by wood species, component-level QC, contractor settlement logic that nobody else understands. We needed an ERP that was made for us, not one we'd have to change our process for. SimpleGrid feels like our system. Our Excel and WhatsApp habits didn't go away: the AI chatbot just replaced them. My stores manager was comfortable on day one because it works the way he already works."</blockquote>
        <div className="attr">- Chirag, Founder, Elite Arts &amp; Crafts</div>
      </div>

      {/* Bottom Line */}
      <div className="case-bottom-line">
        <div className="big">32 things tracked. 36 automatic triggers. 21 days to deploy. $0 upfront.</div>
        <p>Before SimpleGrid, the founder knew the company made money. Now he knows which products make money, and which ones do not.</p>
        <a href="https://calendly.com" target="_blank" rel="noopener" className="btn btn-primary" style={{marginTop:16}}>Book a call - See how we'd model your operations</a>
      </div>
    </div>

    <Footer />
    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<EliteCaseStudy />);
</script>
</body>
</html>
