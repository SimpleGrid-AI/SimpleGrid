<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Singal Fabrics Case Study - SimpleGrid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/LoginModal.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel">
function SingalCaseStudy() {
  const [showLogin, setShowLogin] = React.useState(false);
  return (<>
    <Nav page="cases" onLoginClick={() => setShowLogin(true)} />

    <section className="case-hero">
      <div className="container">
        <div className="tag">CASE STUDY</div>
        <h1>How a multi-stream apparel operation with 20+ job workers deployed an ERP in 12 days</h1>
        <p className="case-hook">Two years. Two failed ERPs. Over $100,000 spent with nothing to show for it. Singal Fabrics is a Bangalore-based apparel operation running three interconnected businesses through 20+ job workers across the city. Every generic ERP assumed a factory model. This operation does not have a factory.</p>
        <div className="case-strip">
          <div className="case-strip-item"><div className="label">Business streams</div><div className="value">3 (CMT + Own Brand + Trading)</div></div>
          <div className="case-strip-item"><div className="label">Operating model</div><div className="value">100% Job work</div></div>
          <div className="case-strip-item"><div className="label">Job worker network</div><div className="value">20+ across Bangalore</div></div>
          <div className="case-strip-item"><div className="label">Deployed in</div><div className="value">12 days</div></div>
        </div>
      </div>
    </section>

    <div className="container">
      <section className="case-section">
        <h2>The operation</h2>
        <p>A Bangalore-based company running three interconnected businesses under one roof. Contract manufacturing for external brand principals. Their own brand: taking orders and manufacturing for retail. Fabric trading: buying fabric at scale and reselling to other manufacturers.</p>
        <p>The production model is <strong>job work</strong>. They do not cut. They do not sew. Every piece of production happens at one of 20+ job worker facilities across Bangalore. Each job worker is a complete production unit. Only two things happen in-house: ironing and packaging.</p>
        <p>Inventory is constantly moving. Fabric, buttons, tags, trims leave their central warehouse for a job worker. Three to five weeks later, finished garments come back. At any given moment, they have materials at 20+ different facilities plus logistics in-transit plus warehouse stock.</p>
        <div className="img-placeholder" style={{margin:'24px 0',minHeight:220}}>Infographic: Hub-and-spoke job worker network - Central warehouse connected to 20+ job worker facilities</div>
      </section>

      <section className="case-section">
        <h2>What was breaking</h2>
        <ul className="pain-list">
          <li><strong>Generic ERPs could not model the operation.</strong> Singal had tried twice over two years. Both times, the same problem: every ERP is built for manufacturers who make things in-house. Both were abandoned.</li>
          <li><strong>Inventory visibility collapsed across the network.</strong> At any given moment, the company had fabric, trims, and finished goods across 20+ facilities. When a brand asked "where is our order?" answering required phone calls to three to five job workers.</li>
          <li><strong>Secondary material tracking was a nightmare.</strong> Every work order required its own bill of materials: specific buttons, hang tags, wash care labels, thread color. All purchased per work order, issued to job workers, reconciled at the end.</li>
          <li><strong>Specifications lived in documents, not in the system.</strong> Cutting patterns, stitch types, wash instructions shared via PDFs, WhatsApp, and phone calls.</li>
          <li><strong>Three businesses collided in one spreadsheet.</strong> CMT, own brand, fabric trading: all tracked in overlapping Excel files. A fabric roll might belong to Brand A's order, their own stock, or a trading customer.</li>
          <li><strong>Job worker reconciliation was chaos.</strong> Each of 20+ workers received fabric AND trims for each work order, returned finished garments. Reconciling was constant manual work.</li>
          <li><strong>Profitability by stream was a mystery.</strong> Was CMT making money or being subsidized by fabric trading? Impossible to tell.</li>
        </ul>
        <div className="img-placeholder" style={{margin:'24px 0',minHeight:200}}>Infographic: Ephemeral SKUs vs Traditional Catalog - Product manufacturer (stable catalog) vs Contract manufacturer (new SKUs per work order)</div>
      </section>

      <section className="case-section">
        <h2>What we built</h2>
        <p>We offered to build it free. The founder's first reaction was that we must be overconfident. Then we sent him a <strong>working demo in 24 hours</strong>: 60–70% accurate to how his operation actually runs, including the distributed job worker network, secondary material procurement, and three separate business streams.</p>
        <p>Over the next 11 days we did 4 working sessions with the founder and his operations head. Walked through every edge case.</p>
        <p style={{fontFamily:'var(--font-heading)',fontSize:18,fontWeight:700,color:'var(--sg-blue)',margin:'24px 0'}}>Day 12: live. 34 things tracked end-to-end. 44 automatic triggers. Inventory visible across 20+ facilities in real time.</p>
      </section>

      <section className="case-section">
        <h2>The full CMT flow</h2>
        <div className="flow-steps">
          {[
            {s:'Brand sends a work order.',b:'Style, sizes, quantities, fabric specs, trim requirements, production specs, dispatch deadline. System auto-generates SKUs.'},
            {s:'Bill of materials built.',b:'Main fabric, secondary fabrics, buttons, hang tags, wash care labels, thread colors, packaging specs. Every item tracked.'},
            {s:'Specifications attached.',b:'Cutting pattern reference, stitch types per seam, wash instructions - digitized and linked to the work order.'},
            {s:'Fabric and trims procured.',b:'Auto-generated POs to fabric vendors and trim suppliers. Stock checked first, only shortfall procured.'},
            {s:'Materials received at warehouse.',b:'Fabric inspected for defects. System tracks by roll, not just total meters. Trims received against their POs.'},
            {s:'Issued to job worker.',b:'Fabric + all secondary materials issued together. Every item tracked per work order, per job worker.'},
            {s:'Job worker produces.',b:'Cutting, stitching, finishing. Job worker is hands. Specifications are Singal\'s.'},
            {s:'Finished goods returned.',b:'Received at warehouse. System reconciles: fabric sent vs garments returned vs expected yield.'},
            {s:'Iron and packaging.',b:'In-house. Each garment ironed, tagged, packed to buyer specs.'},
            {s:'QC at multiple gates.',b:'Pre-dispatch quality check against buyer standards. Rejects sent back to job worker.'},
            {s:'Dispatch to brand.',b:'Packed per buyer specs. System generates packing list, invoice, tracks partial shipments.'},
            {s:'Job worker settlement.',b:'Auto-calculated: garments received minus rejects times piece rate. Per job worker, per work order.'},
          ].map((step,i) => (
            <div key={i} className="flow-step">
              <p><strong>{step.s}</strong> {step.b}</p>
            </div>
          ))}
        </div>
      </section>

      <section className="case-section">
        <h2>Rules the system enforces</h2>
        <ul className="rules-list">
          <li>Can't issue fabric to a job worker without an active work order.</li>
          <li>Can't receive finished goods exceeding the work order quantity.</li>
          <li>Secondary materials must be fully issued before production starts.</li>
          <li>Job worker settlement blocked until all returns are reconciled.</li>
          <li>Fabric roll tracking: defective rolls quarantined, can't enter production.</li>
          <li>Brand-specific packaging specs enforced at dispatch - wrong label format blocks shipment.</li>
        </ul>
      </section>

      <div className="testimonial-block">
        <blockquote>"When they said they'd deploy for free, I honestly thought it was overconfidence. Then I got a working demo in 24 hours - and it was 60–70% accurate to how we actually operate. That's when I knew these guys understood manufacturing. No other vendor has ever shown me a working system before asking me to sign a check."</blockquote>
        <div className="attr">- Founder, Singal Fabrics</div>
      </div>

      <div className="case-bottom-line">
        <div className="big">34 things tracked. 44 automatic triggers. 12 days to deploy. $0 upfront.</div>
        <p>Two years and two failed ERPs. Then 12 days with SimpleGrid. Inventory visible across 20+ job worker facilities in real time for the first time.</p>
        <a href="https://calendly.com" target="_blank" rel="noopener" className="btn btn-primary" style={{marginTop:16}}>Book a call - See how we'd model your operations</a>
      </div>
    </div>

    <Footer />
    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<SingalCaseStudy />);
</script>
</body>
</html>
