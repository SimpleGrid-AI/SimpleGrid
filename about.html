<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/LoginModal.jsx"></script>
<script type="text/babel" src="components/Interactive.jsx"></script>
<script type="text/babel" src="components/HomeBottom.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel">
function AboutPage() {
  const [showLogin, setShowLogin] = React.useState(false);
  return (<>
    <Nav page="about" onLoginClick={() => setShowLogin(true)} />

    <section className="section" style={{paddingBottom:24}}>
      <div className="container">
        <div className="tag">ABOUT US</div>
        <h2 className="h2 ink" style={{maxWidth:880}}>An ERP built by operators, for operators.</h2>
        <p className="lead" style={{maxWidth:760}}>
          SimpleGrid was not designed in a boardroom. It was designed on a shop floor that was already running on Excel and WhatsApp - and not working. We built the system we wished we had.
        </p>
      </div>
    </section>

    <FounderStory />

    <section className="section section-dark final-cta">
      <div className="container">
        <h2 className="h2">Want the founder on your call?</h2>
        <p className="sub">Every deployment is led by Mukund personally. No sales team. No chatbot.</p>
        <a href="https://cal.com/simplegrid-ai" target="_blank" rel="noopener" className="btn btn-lg btn-primary">Book a call</a>
      </div>
    </section>

    <Footer />
    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<AboutPage />);
</script>
