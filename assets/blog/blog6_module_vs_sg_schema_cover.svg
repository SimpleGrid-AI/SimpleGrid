<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Module-Based ERP vs SG Schema ERP - two architectures, two outcomes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1115"/>
      <stop offset="1" stop-color="#1A1D24"/>
    </linearGradient>
    <linearGradient id="badGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2530"/>
      <stop offset="1" stop-color="#1F1418"/>
    </linearGradient>
    <linearGradient id="goodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2A4A"/>
      <stop offset="1" stop-color="#0E1A30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top label -->
  <text x="60" y="80" font-family="Geist, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#7A8190" letter-spacing="3" text-transform="uppercase">SimpleGrid · Architecture</text>

  <!-- Title (two lines for readability) -->
  <text x="60" y="160" font-family="Geist, system-ui, sans-serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">Module-Based ERP</text>
  <text x="60" y="225" font-family="Geist, system-ui, sans-serif" font-size="34" font-weight="500" fill="#8A8F98" letter-spacing="-0.5">vs.</text>
  <text x="60" y="285" font-family="Geist, system-ui, sans-serif" font-size="62" font-weight="700" fill="#4A7BF7" letter-spacing="-1.5">SG Schema ERP</text>

  <!-- Two-column comparison -->
  <!-- LEFT column: module-based (rigid stacked boxes) -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="500" height="220" rx="14" fill="url(#badGrad)" stroke="#3A2530" stroke-width="1"/>
    <text x="24" y="38" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E07A8E" letter-spacing="2">MODULE-BASED</text>
    <text x="24" y="74" font-family="Geist, system-ui, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">$10K-$50K per change</text>
    <text x="24" y="100" font-family="Geist, system-ui, sans-serif" font-size="14" fill="#9CA1AC">Hardcoded workflows. Customization is consulting.</text>
    <!-- 4 stacked module boxes representing rigidity -->
    <g transform="translate(24, 120)">
      <rect x="0" y="0" width="100" height="22" rx="3" fill="none" stroke="#5A4048" stroke-width="1.4"/>
      <rect x="0" y="28" width="100" height="22" rx="3" fill="none" stroke="#5A4048" stroke-width="1.4"/>
      <rect x="110" y="0" width="100" height="22" rx="3" fill="none" stroke="#5A4048" stroke-width="1.4"/>
      <rect x="110" y="28" width="100" height="22" rx="3" fill="none" stroke="#5A4048" stroke-width="1.4"/>
      <rect x="220" y="0" width="100" height="22" rx="3" fill="none" stroke="#5A4048" stroke-width="1.4"/>
      <rect x="220" y="28" width="100" height="22" rx="3" fill="none" stroke="#5A4048" stroke-width="1.4"/>
      <text x="50" y="14" font-family="Geist" font-size="9" fill="#9CA1AC" text-anchor="middle">Procurement</text>
      <text x="50" y="42" font-family="Geist" font-size="9" fill="#9CA1AC" text-anchor="middle">Inventory</text>
      <text x="160" y="14" font-family="Geist" font-size="9" fill="#9CA1AC" text-anchor="middle">Production</text>
      <text x="160" y="42" font-family="Geist" font-size="9" fill="#9CA1AC" text-anchor="middle">Quality</text>
      <text x="270" y="14" font-family="Geist" font-size="9" fill="#9CA1AC" text-anchor="middle">Finance</text>
      <text x="270" y="42" font-family="Geist" font-size="9" fill="#9CA1AC" text-anchor="middle">Reports</text>
    </g>
    <text x="24" y="200" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#E07A8E" font-weight="600">4 weeks. 1 consultant.</text>
  </g>

  <!-- RIGHT column: SG Schema (organic blob, generated) -->
  <g transform="translate(640, 360)">
    <rect x="0" y="0" width="500" height="220" rx="14" fill="url(#goodGrad)" stroke="#1A2A4A" stroke-width="1"/>
    <text x="24" y="38" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="700" fill="#7AA0FF" letter-spacing="2">SG SCHEMA</text>
    <text x="24" y="74" font-family="Geist, system-ui, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">3 lines in your spec</text>
    <text x="24" y="100" font-family="Geist, system-ui, sans-serif" font-size="14" fill="#9CA1AC">SG Engine reads the spec. The system regenerates.</text>
    <!-- Organic shape representing the GridSpec / SG Schema -->
    <g transform="translate(24, 118)">
      <path d="M40 30 Q120 8 200 28 Q280 50 250 90 Q210 122 140 110 Q60 98 30 70 Q12 50 40 30 Z" fill="rgba(74,123,247,0.16)" stroke="#4A7BF7" stroke-width="1.6"/>
      <text x="146" y="74" font-family="Geist" font-size="13" fill="#7AA0FF" text-anchor="middle" font-weight="600">your operation</text>
      <text x="146" y="92" font-family="Geist" font-size="11" fill="#5A6480" text-anchor="middle">entities · states · rules · events</text>
    </g>
    <text x="24" y="200" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#7AA0FF" font-weight="600">Minutes. Zero code.</text>
  </g>

  <!-- Footer logo line -->
  <text x="60" y="600" font-family="Geist, system-ui, sans-serif" font-size="14" font-weight="600" fill="#5A6480" letter-spacing="0.5">simplegrid.ai</text>
  <text x="1140" y="600" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#5A6480" text-anchor="end">AI ERP for manufacturers</text>
</svg>
